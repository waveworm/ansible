---
- name: FreePBX - fwconsole ma updateall (weekly)
  hosts: all
  gather_facts: false
  serial: 1

  tasks:
    - name: Confirm fwconsole exists
      raw: "command -v fwconsole"
      register: has_fwconsole
      changed_when: false
      failed_when: has_fwconsole.rc != 0

    - name: Run module updates (no python required, w/ timeout)
      raw: "LC_ALL=C LANG=C timeout 1800 fwconsole ma updateall"
      register: update_out
      failed_when: update_out.rc != 0
      changed_when: "'Up to date.' not in (update_out.stdout | default(''))"

    - name: Summary
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "update rc: {{ update_out.rc | default('n/a') }}"
          - "stdout tail: {{ (update_out.stdout | default('')).splitlines()[-20:] }}"
          - "stderr tail: {{ (update_out.stderr | default('')).splitlines()[-20:] }}"
