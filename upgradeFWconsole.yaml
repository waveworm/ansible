---
- name: Run fwconsole ma updateall on all machines
  hosts: all
  gather_facts: false

  tasks:
    - name: Run fwconsole module updates (no python required)
      raw: fwconsole ma updateall
      register: fwconsole_out
      changed_when: false

    - name: Show fwconsole output
      debug:
        var: fwconsole_out.stdout_lines
