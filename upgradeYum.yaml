---
- name: FreePBX - OS package updates (weekly)
  hosts: all
  gather_facts: false
  serial: 1
  any_errors_fatal: false

  tasks:
    - name: Confirm yum exists
      raw: "command -v yum"
      register: has_yum
      changed_when: false
      failed_when: has_yum.rc != 0

    - name: Check active calls (skip updates if any calls)
      raw: |
        asterisk -rx "core show channels count" 2>/dev/null | head -n 1 || true
      register: calls_out
      changed_when: false

    - name: Parse active call count
      set_fact:
        active_calls: "{{ (calls_out.stdout | regex_search('([0-9]+) active call', '\\1')) | default('0') | int }}"
      changed_when: false

    - name: Show active calls
      debug:
        msg: "Active calls on {{ inventory_hostname }}: {{ active_calls }}"

    - name: Show available updates (pre)
      raw: "yum -q check-update || true"
      register: yum_pre
      changed_when: false
      failed_when: false
      when: active_calls == 0

    - name: Run yum update (timeout 30 min) ONLY if no active calls
      raw: "LC_ALL=C LANG=C timeout 1800 yum -y update"
      register: yum_update
      failed_when: yum_update.rc not in [0, 100]
      changed_when: yum_update.rc == 100
      when: active_calls == 0

    - name: Skip notice (calls in progress)
      debug:
        msg: "Skipping yum update on {{ inventory_hostname }} because active_calls={{ active_calls }}"
      when: active_calls > 0

    - name: Check if reboot is required (best-effort)
      raw: |
        if command -v needs-restarting >/dev/null 2>&1; then
          needs-restarting -r >/dev/null 2>&1 && echo REBOOT_REQUIRED || echo NO_REBOOT
        else
          echo UNKNOWN_NO_NEEDS_RESTARTING
        fi
      register: reboot_check
      changed_when: false
      failed_when: false
      when: active_calls == 0

    - name: Summary
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Active calls: {{ active_calls }}"
          - "yum rc: {{ yum_update.rc | default('skipped') }}"
          - "Reboot needed: {{ reboot_check.stdout | default('skipped') }}"
          - "stdout tail: {{ (yum_update.stdout | default('')).splitlines()[-15:] }}"
          - "stderr tail: {{ (yum_update.stderr | default('')).splitlines()[-15:] }}"
