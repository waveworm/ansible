---
- name: FreePBX - OS package updates (weekly)
  hosts: all
  gather_facts: false
  serial: 1

  tasks:
    - name: Confirm yum exists
      raw: "command -v yum"
      register: has_yum
      changed_when: false
      failed_when: has_yum.rc != 0
      check_mode: no

    - name: Check active calls (skip updates if any calls)
      raw: 'asterisk -rx "core show channels count" 2>/dev/null | head -n 1 || true'
      register: calls_out
      changed_when: false
      check_mode: no

    - name: Parse active call count
      set_fact:
        active_calls: "{{ (calls_out.stdout | regex_search('([0-9]+) active call', '\\1')) | default('0') | int }}"
      changed_when: false

    - name: Show active calls
      debug:
        msg: "Active calls on {{ inventory_hostname }}: {{ active_calls }}"

    - name: Run yum update (timeout 30 min) ONLY if no active calls
      raw: "LC_ALL=C LANG=C timeout 1800 yum -y update"
      register: yum_update
      failed_when: yum_update.rc not in [0, 100]
      changed_when: yum_update.rc == 100
      when: active_calls == 0
      check_mode: no

    - name: Skip notice (calls in progress)
      debug:
        msg: "Skipping yum update on {{ inventory_hostname }} because active_calls={{ active_calls }}"
      when: active_calls > 0
