---
- name: FreePBX - OS package updates (weekly)
  hosts: all
  gather_facts: false
  serial: 1
  any_errors_fatal: false

  tasks:
    - name: Confirm yum exists
      raw: "command -v yum"
      register: has_yum
      changed_when: false
      failed_when: has_yum.rc != 0

    - name: Show available updates (pre)
      raw: "yum -q check-update || true"
      register: yum_pre
      changed_when: false
      failed_when: false

    - name: Run yum update (with timeout)
      raw: |
        if command -v timeout >/dev/null 2>&1; then
          LC_ALL=C LANG=C timeout 1800 yum -y update
        else
          echo "WARNING: timeout not installed; running yum without timeout"
          LC_ALL=C LANG=C yum -y update
        fi
      register: yum_update
      failed_when: yum_update.rc not in [0, 100]
      changed_when: yum_update.rc == 100

    - name: Check if reboot is required (best-effort)
      raw: |
        if command -v needs-restarting >/dev/null 2>&1; then
          needs-restarting -r >/dev/null 2>&1 && echo REBOOT_REQUIRED || echo NO_REBOOT
        else
          echo UNKNOWN
        fi
      register: reboot_check
      changed_when: false
      failed_when: false

    - name: Summary
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "yum rc: {{ yum_update.rc | default('n/a') }}"
          - "Reboot needed: {{ reboot_check.stdout | default('unknown') }}"
          - "stdout tail: {{ (yum_update.stdout | default('')).splitlines()[-15:] }}"
          - "stderr tail: {{ (yum_update.stderr | default('')).splitlines()[-15:] }}"
